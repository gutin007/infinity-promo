<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Busca - Infinity Promo</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="infinity.png">
  <meta name="description" content="Busque promoções por nome ou categoria. Eletrônicos, moda, casa, esportes, livros e games com os melhores preços no Infinity Promo.">
  <script type="module" src="js/supabase.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-container">
      <a href="index.html" class="logo">
        <img src="infinity.png" alt="Logo" class="logo-img">
        Infinity Promo
      </a>
      <button class="menu-toggle" aria-label="Menu">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" x2="20" y1="12" y2="12"/>
          <line x1="4" x2="20" y1="6" y2="6"/>
          <line x1="4" x2="20" y1="18" y2="18"/>
        </svg>
      </button>
      <ul class="nav-links">
        <li><a href="index.html">Início</a></li>
        <li><a href="sobre.html">Sobre</a></li>
        <li><a href="faq.html">FAQ</a></li>
      </ul>
    </div>
  </header>

  <div class="search-header">
    <div class="search-header-content">
      <div class="search-bar-small">
        <input type="text" class="search-input" id="searchInput" placeholder="Pesquisar produto...">
        <button class="search-btn" id="searchBtn">Buscar</button>
      </div>
      <p class="results-info" id="resultsInfo"></p>
    </div>
  </div>

  <section class="section">
    <div class="filters-bar">
      <div class="filter-pills" id="filterPills">
        <button class="filter-pill active" data-category="all">Todos</button>
      </div>
      <select class="sort-select" id="sortSelect">
        <option value="discount">Maior desconto</option>
        <option value="price-asc">Menor preço</option>
        <option value="price-desc">Maior preço</option>
        <option value="recent">Mais recente</option>
      </select>
    </div>

    <div class="products-grid" id="productsGrid"></div>
  </section>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-brand">
        <div class="logo">
          <img src="infinity.png" alt="Logo" class="logo-img">
          Infinity Promo
        </div>
        <p>Encontre as melhores promoções</p>
      </div>
      <div class="footer-links">
        <h4>Links</h4>
        <ul>
          <li><a href="sobre.html">Sobre</a></li>
          <li><a href="#">Contato</a></li>
          <li><a href="#">Política de Privacidade</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 Infinity Promo. Todos os direitos reservados.</p>
    </div>
  </footer>

  <script type="module" src="search.js"></script>
</body>
</html>
